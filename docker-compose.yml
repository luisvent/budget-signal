services:
  api:
    build:
      context: .
      target: api
    image: budget-signal-api:latest
    container_name: budget-signal-api
    restart: unless-stopped
    ports:
      - "8734:8734"
    environment:
      HOST: "0.0.0.0"
      PORT: "8734"
      BUDGET_SIGNAL_DATA_DIR: "/data"
      BUDGET_SIGNAL_ACCESS_CODE: "${BUDGET_SIGNAL_ACCESS_CODE:-0607}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      BUDGET_SUMMARY_EMAIL_TO: "${BUDGET_SUMMARY_EMAIL_TO:-}"
      BUDGET_SUMMARY_EMAIL_FROM: "${BUDGET_SUMMARY_EMAIL_FROM:-Budget Signal <onboarding@resend.dev>}"
      BUDGET_SUMMARY_EMAIL_SUBJECT_PREFIX: "${BUDGET_SUMMARY_EMAIL_SUBJECT_PREFIX:-Budget Signal}"
    volumes:
      - budget-signal-data:/data

  web:
    build:
      context: .
      target: web
    image: budget-signal-web:latest
    container_name: budget-signal-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "4210:4210"

volumes:
  budget-signal-data: